apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: canary-demo-route
  namespace: default
spec:
  parentRefs:
  - name: example-gateway
  hostnames:
  - "canary-demo.example.com"
  rules:
  # Rule 1: Route traffic with canary header to canary service only
  - matches:
    - headers:
      - type: Exact
        name: x-canary
        value: "true"
    backendRefs:
    - name: canary-demo-canary-service
      port: 80
  # Rule 2: Split remaining traffic 90/10
  - backendRefs:
    - name: canary-demo-stable-service
      port: 80
      weight: 90
    - name: canary-demo-canary-service
      port: 80
      weight: 10
